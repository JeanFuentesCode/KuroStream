<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuroStream | Ultra Fast Experience</title>
    
    <!-- Preconnect a dominios críticos para ganar milisegundos -->
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts optimizadas -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Bebas+Neue&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff003c;
            --primary-glow: rgba(255, 0, 60, 0.4);
            --bg-deep: #050505;
            --card-bg: #0d0d0f;
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .font-bebas { font-family: 'Bebas Neue', cursive; }
        .font-outfit { font-family: 'Outfit', sans-serif; }

        .crimson-gradient {
            background: linear-gradient(135deg, #ff003c 0%, #990024 100%);
        }

        .hero-mask {
            background: linear-gradient(to right, var(--bg-deep) 0%, rgba(5, 5, 5, 0.7) 40%, transparent 100%),
                        linear-gradient(to top, var(--bg-deep) 5%, transparent 50%);
        }

        /* Optimización de rendimiento: Uso de transform y opacity solamente */
        .anime-card {
            background: var(--card-bg);
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            will-change: transform;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .anime-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--primary);
        }

        .poster-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 0.75rem;
            background: #111; /* Skeleton background */
        }

        .glass-panel {
            background: rgba(10, 10, 12, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Animación suave de entrada */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <!-- Navegación -->
    <nav class="fixed top-0 w-full z-[100] px-6 py-4 flex justify-between items-center transition-all duration-300" id="main-nav">
        <div class="flex items-center gap-10">
            <div class="flex items-center gap-2 cursor-pointer group">
                <div class="w-10 h-10 crimson-gradient rounded-full flex items-center justify-center shadow-[0_0_15px_var(--primary-glow)]">
                    <i data-lucide="zap" class="text-white fill-current w-5 h-5"></i>
                </div>
                <h1 class="text-2xl font-bebas tracking-wider">KURO<span class="text-primary">STREAM</span></h1>
            </div>
            <div class="hidden lg:flex items-center gap-8 text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">
                <a href="#" class="hover:text-white transition-colors">Explorar</a>
                <a href="#" class="hover:text-white transition-colors">Simulcasts</a>
                <a href="#" class="hover:text-white transition-colors">Películas</a>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="hidden md:flex items-center glass-panel rounded-full px-4 py-1.5 border border-white/5">
                <i data-lucide="search" class="w-4 h-4 text-gray-500"></i>
                <input type="text" placeholder="Buscar anime..." class="bg-transparent border-none text-xs px-2 focus:outline-none w-32 text-white">
            </div>
            <button class="bg-white text-black font-black text-[10px] uppercase px-5 py-2 rounded-full hover:bg-primary hover:text-white transition-all">
                Entrar
            </button>
        </div>
    </nav>

    <main>
        <!-- Hero optimizado para LCP (Largest Contentful Paint) -->
        <section class="relative h-[90vh] w-full flex items-center overflow-hidden">
            <div class="absolute inset-0">
                <img src="https://images.unsplash.com/photo-1578632292335-df3abbb0d586?q=80&w=1600&auto=format&fit=crop" 
                     class="w-full h-full object-cover" 
                     alt="Hero"
                     fetchpriority="high">
                <div class="absolute inset-0 hero-mask"></div>
            </div>

            <div class="relative w-full max-w-[1440px] mx-auto px-6">
                <div class="max-w-2xl space-y-4">
                    <div class="flex items-center gap-2">
                        <span class="bg-primary px-2 py-0.5 rounded text-[9px] font-black uppercase">Nuevo</span>
                        <span class="text-gray-400 font-bold text-[10px] uppercase tracking-widest">S1 E12 • Invierno 2024</span>
                    </div>
                    <h2 class="text-6xl md:text-8xl font-bebas leading-none text-white">
                        SOLO <span class="text-primary">LEVELING</span>
                    </h2>
                    <p class="text-base text-gray-300 max-w-lg font-medium leading-relaxed">
                        El cazador más débil de la humanidad encuentra una misión oculta que solo él puede ver.
                    </p>
                    <div class="flex items-center gap-3 pt-2">
                        <button class="crimson-gradient text-white px-8 py-3 rounded-full font-black text-[11px] uppercase tracking-widest flex items-center gap-2 hover:scale-105 transition-transform">
                            <i data-lucide="play" class="w-4 h-4 fill-current"></i> Ver Ahora
                        </button>
                        <button class="glass-panel text-white p-3 rounded-full hover:bg-white/10 transition-all">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Grilla de contenido con Lazy Loading -->
        <div class="max-w-[1440px] mx-auto px-6 -mt-24 relative z-10 pb-20">
            <section class="space-y-6 reveal">
                <div class="flex justify-between items-center">
                    <h3 class="text-3xl font-bebas tracking-wide">CONTINUAR <span class="text-gray-500">VIENDO</span></h3>
                    <div class="flex gap-2">
                        <button class="w-8 h-8 rounded-full border border-white/10 flex items-center justify-center hover:bg-primary transition-colors"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                        <button class="w-8 h-8 rounded-full border border-white/10 flex items-center justify-center hover:bg-primary transition-colors"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                    </div>
                </div>

                <div id="dynamic-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                    <!-- Las tarjetas se inyectan con optimización de fragmentos -->
                </div>
            </section>
        </div>
    </main>

    <!-- Menú móvil optimizado -->
    <div class="md:hidden fixed bottom-4 left-1/2 -translate-x-1/2 w-[90%] glass-panel rounded-2xl p-2 flex justify-around items-center z-[200] shadow-2xl border border-white/5">
        <i data-lucide="home" class="w-5 h-5 text-primary"></i>
        <i data-lucide="compass" class="w-5 h-5 text-gray-400"></i>
        <div class="w-12 h-12 crimson-gradient rounded-xl flex items-center justify-center text-white shadow-lg -mt-8 border-4 border-[#050505]">
            <i data-lucide="search" class="w-5 h-5"></i>
        </div>
        <i data-lucide="bookmark" class="w-5 h-5 text-gray-400"></i>
        <i data-lucide="user" class="w-5 h-5 text-gray-400"></i>
    </div>

    <!-- Scripts diferidos -->
    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js"></script>
    <script>
        const animeData = [
            { title: "Chainsaw Man", tags: "Acción", score: "9.5", img: "https://images.unsplash.com/photo-1618336753974-aae8e04506aa?q=80&w=400" },
            { title: "Jujutsu Kaisen", tags: "Shonen", score: "9.8", img: "https://images.unsplash.com/photo-1607604276443-cda2c9309174?q=80&w=400" },
            { title: "Demon Slayer", tags: "Fantasía", score: "9.9", img: "https://images.unsplash.com/photo-1621478374422-35206faeddfb?q=80&w=400" },
            { title: "Attack on Titan", tags: "Drama", score: "9.7", img: "https://images.unsplash.com/photo-1541562232579-512a21360020?q=80&w=400" },
            { title: "Cyberpunk", tags: "Sci-Fi", score: "9.2", img: "https://images.unsplash.com/photo-1635273051937-2007469062cc?q=80&w=400" },
            { title: "Blue Lock", tags: "Deportes", score: "8.9", img: "https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=400" }
        ];

        function init() {
            const grid = document.getElementById('dynamic-grid');
            const fragment = document.createDocumentFragment(); // Mejora rendimiento de inserción
            
            [...animeData, ...animeData].forEach(item => {
                const card = document.createElement('div');
                card.className = "anime-card group rounded-xl p-1.5";
                card.innerHTML = `
                    <div class="poster-wrapper aspect-[2/3]">
                        <img src="${item.img}" 
                             loading="lazy" 
                             class="w-full h-full object-cover transition-opacity duration-300" 
                             alt="${item.title}"
                             onload="this.style.opacity=1" style="opacity:0">
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/40">
                             <div class="w-10 h-10 crimson-gradient rounded-full flex items-center justify-center"><i data-lucide="play" class="w-4 h-4 text-white fill-current"></i></div>
                        </div>
                    </div>
                    <div class="mt-2 px-1">
                        <h4 class="text-xs font-bold truncate group-hover:text-primary transition-colors">${item.title}</h4>
                        <div class="flex justify-between text-[9px] text-gray-500 mt-1 font-bold">
                            <span>${item.tags}</span>
                            <span class="text-primary">${item.score} ★</span>
                        </div>
                    </div>
                `;
                fragment.appendChild(card);
            });
            grid.appendChild(fragment);
            lucide.createIcons();

            // Navbar behavior optimizado con passive listener
            window.addEventListener('scroll', () => {
                const nav = document.getElementById('main-nav');
                nav.classList.toggle('glass-panel', window.scrollY > 20);
                nav.classList.toggle('py-2', window.scrollY > 20);
            }, { passive: true });

            // Reveal observer
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        window.onload = init;
    </script>
</body>
</html>
