<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuroStream | High Performance</title>
    
    <!-- Favicon dinámico usando el SVG del Logo -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M20 20L80 50L20 80V55L45 50L20 45V20Z' fill='%23FF003C'/></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff003c;
            --primary-glow: rgba(255, 0, 60, 0.4);
            --bg-deep: #050505;
            --card-bg: #0d0d0f;
            --glitter: url("https://assets.codepen.io/13471/silver-glitter-background.png");
        }
        
        /* Barra de desplazamiento personalizada */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-deep);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, var(--primary), #ffffff);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(to bottom, #990024, #cccccc);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .font-bebas { font-family: 'Bebas Neue', cursive; }

        .crimson-gradient {
            background: linear-gradient(135deg, #ff003c 0%, #990024 100%);
        }

        /* Navbar */
        #main-nav {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
            will-change: transform;
        }

        .nav-scrolled {
            background: rgba(5, 5, 5, 0.8) !important;
            backdrop-filter: blur(10px);
            padding-top: 1rem !important;
            padding-bottom: 1rem !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-hidden { transform: translateY(-110%); }

        /* LOGO STYLE */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .logo-container:hover { opacity: 0.8; }

        /* EFECTO FUEGO */
        .fire-effect::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: var(--glitter), var(--glitter),
                linear-gradient(0deg, white 0px, #ff8951 2px, rgba(220, 188, 22, 0.4) 10%, transparent 100%);
            background-size: 150px 100px, 200px 150px, 100% 100%;
            background-blend-mode: hard-light, color-dodge;
            mix-blend-mode: color-dodge;
            filter: brightness(2.5) blur(4px) contrast(4);
            animation: fireMove 1.5s linear infinite;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        @keyframes fireMove {
            0% { background-position: center 0px, center 0px, 50% 100%; }
            100% { background-position: center -100px, center -150px, 50% 100%; }
        }

        /* LOADER OPTIMIZADO */
        .loader-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-deep);
            z-index: 60;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .kinetic-loader {
            width: 50px;
            height: 50px;
            position: relative;
        }

        .kinetic-loader::before,
        .kinetic-loader::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 3px solid transparent;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: kineticSpin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .kinetic-loader::after {
            border-top-color: white;
            animation-delay: -0.4s;
        }

        @keyframes kineticSpin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .hero-mask {
            background: linear-gradient(to right, var(--bg-deep) 0%, rgba(5, 5, 5, 0.6) 30%, transparent 100%),
                        linear-gradient(to top, var(--bg-deep) 10%, transparent 50%);
        }

        .hero-img-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 1.2s ease-in-out;
            filter: brightness(0.8); /* Brillo aumentado de 0.6 a 0.8 */
            will-change: opacity;
        }

        .img-active { opacity: 1; z-index: 5; }
        .img-next { opacity: 0; z-index: 4; }

        .hero-text-anim {
            animation: heroSlideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes heroSlideIn {
            0% { opacity: 0; transform: translateY(15px); filter: blur(5px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .hero-text-exit {
            animation: heroSlideOut 0.5s ease-in forwards;
        }

        @keyframes heroSlideOut {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-15px); filter: blur(5px); }
        }

        .float-animation { animation: float 4s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }

        .anime-card {
            background: var(--card-bg);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s, opacity 0.6s, transform 0.6s;
            border: 1px solid rgba(255, 255, 255, 0.03);
            opacity: 0;
            transform: translateY(30px);
        }

        .anime-card.in-view {
            opacity: 1;
            transform: translateY(0);
        }

        .anime-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 15px 30px -10px var(--primary-glow);
        }

        .reveal-init {
            opacity: 0;
            transition: opacity 1s ease-out;
        }

        .revealed { opacity: 1 !important; }

        .mobile-nav {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(13, 13, 15, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 200;
            display: none;
        }

        @media (pointer: coarse), (max-width: 1024px) {
            .mobile-nav { display: flex; }
        }

        .mobile-nav-item {
            padding: 10px 14px;
            border-radius: 18px;
            color: #888;
        }
        .mobile-nav-item.active { color: white; }

        .mobile-nav-search {
            background: var(--primary);
            color: white;
            padding: 12px;
            border-radius: 18px;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-[100] px-6 py-6 flex justify-between items-center" id="main-nav">
        <!-- Logo -->
        <div class="logo-container">
            <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 20L80 50L20 80V55L45 50L20 45V20Z" fill="url(#logo-grad)" filter="url(#glow)"/>
                <defs>
                    <linearGradient id="logo-grad" x1="20" y1="20" x2="80" y2="80" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#FF003C"/>
                        <stop offset="1" stop-color="#990024"/>
                    </linearGradient>
                    <filter id="glow" x="0" y="0" width="120" height="120" filterUnits="userSpaceOnUse">
                        <feGaussianBlur stdDeviation="3" result="blur"/>
                        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                    </filter>
                </defs>
            </svg>
            <h1 class="font-bebas text-2xl md:text-3xl tracking-tighter italic">KURO<span class="text-primary">STREAM</span></h1>
        </div>

        <button class="fire-effect bg-white text-black font-black text-[10px] md:text-[12px] uppercase px-8 py-2.5 rounded-full transition-all duration-300 hover:scale-110 shadow-xl relative overflow-visible">
            Acceder
        </button>
    </nav>

    <!-- Menú Móvil -->
    <div class="mobile-nav fire-effect" id="mobile-menu">
        <a href="#" class="mobile-nav-item active"><i data-lucide="home" class="w-5 h-5"></i></a>
        <a href="#" class="mobile-nav-item"><i data-lucide="compass" class="w-5 h-5"></i></a>
        <a href="#" class="mobile-nav-search"><i data-lucide="search" class="w-5 h-5"></i></a>
        <a href="#" class="mobile-nav-item"><i data-lucide="bookmark" class="w-5 h-5"></i></a>
        <a href="#" class="mobile-nav-item"><i data-lucide="user" class="w-5 h-5"></i></a>
    </div>

    <main>
        <section class="relative h-[90vh] md:h-[95vh] w-full flex items-center overflow-hidden bg-black">
            <!-- Loader -->
            <div id="hero-loader" class="loader-container">
                <div class="kinetic-loader"></div>
            </div>

            <div class="absolute inset-0" id="hero-bg-container">
                <img id="img-layer-1" src="" class="hero-img-layer img-active" alt="" decoding="async">
                <img id="img-layer-2" src="" class="hero-img-layer img-next" alt="" decoding="async">
                <div class="absolute inset-0 hero-mask z-10"></div>
            </div>

            <div class="relative w-full max-w-[1440px] mx-auto px-6 z-20 pt-20">
                <div id="hero-content-wrapper" class="max-w-2xl space-y-6 reveal-init">
                    <div class="flex items-center gap-3">
                        <span id="hero-tag" class="bg-primary px-3 py-1 rounded-sm text-[10px] font-black uppercase tracking-tighter"></span>
                        <span id="hero-info" class="text-gray-400 font-bold text-[10px] uppercase tracking-[0.2em]"></span>
                    </div>
                    <!-- Títulos del carrusel con Space Grotesk Bold -->
                    <h2 id="hero-title" class="text-6xl md:text-9xl font-bold leading-[0.85] text-white uppercase tracking-tighter" style="font-family: 'Space Grotesk', sans-serif;"></h2>
                    <p id="hero-desc" class="text-base md:text-lg text-gray-300 max-w-lg font-medium leading-relaxed border-l-2 border-primary pl-5"></p>
                    <div class="flex items-center gap-4 pt-4">
                        <button class="float-animation crimson-gradient text-white px-10 py-4 rounded-full font-black text-xs uppercase tracking-widest flex items-center gap-3 hover:brightness-110 transition-all">
                            <i data-lucide="play" class="w-5 h-5 fill-current"></i> Ver Ahora
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Grid de Anime -->
        <div id="library-section" class="max-w-[1440px] mx-auto px-6 mt-16 relative z-40 pb-32">
            <div class="flex flex-col items-center mb-12">
                <h3 class="text-4xl md:text-5xl font-bebas tracking-tighter italic text-center">EXPLORA LO <span class="text-primary">ÚLTIMO</span></h3>
                <div class="w-16 h-1 bg-primary mt-3 rounded-full"></div>
            </div>
            <div id="anime-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6 md:gap-8"></div>
        </div>
    </main>

    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js"></script>
    <script>
        const heroSlides = [
            { title: "SOLO <span class='text-primary'>LEVELING</span>", desc: "Del más débil al más fuerte. Sung Jinwoo despierta un sistema de niveles secreto.", tag: "Tendencia", info: "S1 • Acción / Fantasía", img: "./images/imagen1.webp" },
            { title: "ONE <span class='text-primary'>PIECE</span>", desc: "Únete a Luffy en el arco de Egghead mientras el mundo se prepara para la guerra final.", tag: "Legendario", info: "Ep 1115 • Aventura", img: "./images/imagen2.webp" },
            { title: "FRIEREN <span class='text-primary'>BEYOND</span>", desc: "Tras derrotar al Rey Demonio, la elfa Frieren comienza un nuevo viaje.", tag: "Aclamado", info: "S1 • Viaje / Magia", img: "./images/imagen3.webp" },
            { title: "DEMON <span class='text-primary'>SLAYER</span>", desc: "La respiración del sol vuelve. Tanjiro se prepara para el Castillo Infinito.", tag: "Épico", info: "Nueva Temp • Shonen", img: "./images/imagen4.webp" },
            { title: "JUJUTSU <span class='text-primary'>KAISEN</span>", desc: "La expansión de dominio es solo el comienzo. Itadori se enfrenta a su destino.", tag: "Popular", info: "S2 • Sobrenatural", img: "./images/imagen5.webp" }
        ];

        const catalog = [
            { t: "Kaiju No. 8", g: "Acción", i: "./images/anime1.webp" },
            { t: "Tokyo Revengers", g: "Drama", i: "./images/anime2.webp" },
            { t: "Mushoku Tensei", g: "Isekai", i: "./images/anime3.webp" },
            { t: "Naruto", g: "Ninja", i: "./images/anime4.webp" },
            { t: "Bleach TYBW", g: "Espadas", i: "./images/anime5.webp" },
            { t: "Blue Lock", g: "Deportes", i: "./images/anime6.webp" },
            { t: "Chainsaw Man", g: "Acción", i: "./images/anime7.webp" },
            { t: "Spy x Family", g: "Comedia", i: "./images/anime8.webp" },
            { t: "Oshi No Ko", g: "Drama", i: "./images/anime9.webp" },
            { t: "Haikyuu!!", g: "Deportes", i: "./images/anime10.webp" },
            { t: "Black Clover", g: "Magia", i: "./images/anime11.webp" },
            { t: "Vinland Saga", g: "Seinen", i: "./images/anime12.webp" }
        ];

        let currentIdx = 0;
        let activeLayer = 1;
        let isTransitioning = false;
        const heroWrapper = document.getElementById('hero-content-wrapper');
        const loader = document.getElementById('hero-loader');

        function preloadImage(url) {
            const img = new Image();
            img.src = url;
        }

        function changeSlide(index, isFirstLoad = false) {
            if (isTransitioning || (!isFirstLoad && index === currentIdx)) return;
            isTransitioning = true;
            
            const nextSlide = heroSlides[index];
            const layer1 = document.getElementById('img-layer-1');
            const layer2 = document.getElementById('img-layer-2');
            
            if (!isFirstLoad) {
                heroWrapper.classList.remove('hero-text-anim');
                heroWrapper.classList.add('hero-text-exit');
            }

            const targetImg = activeLayer === 1 ? layer2 : layer1;

            loader.style.opacity = '1';
            targetImg.src = nextSlide.img;
            
            targetImg.onload = () => {
                loader.style.opacity = '0';
                
                if (activeLayer === 1) {
                    layer1.classList.replace('img-active', 'img-next');
                    layer2.classList.replace('img-next', 'img-active');
                    activeLayer = 2;
                } else {
                    layer2.classList.replace('img-active', 'img-next');
                    layer1.classList.replace('img-next', 'img-active');
                    activeLayer = 1;
                }

                currentIdx = index;
                document.getElementById('hero-title').innerHTML = nextSlide.title;
                document.getElementById('hero-desc').textContent = nextSlide.desc;
                document.getElementById('hero-tag').textContent = nextSlide.tag;
                document.getElementById('hero-info').textContent = nextSlide.info;
                
                heroWrapper.classList.remove('hero-text-exit');
                if (isFirstLoad) heroWrapper.classList.add('revealed');
                void heroWrapper.offsetWidth; 
                heroWrapper.classList.add('hero-text-anim');
                
                isTransitioning = false;
                preloadImage(heroSlides[(index + 1) % heroSlides.length].img);
            };

            targetImg.onerror = () => {
                loader.style.opacity = '0';
                isTransitioning = false;
            };
        }

        function init() {
            const grid = document.getElementById('anime-grid');
            grid.innerHTML = catalog.map(item => `
                <div class="anime-card rounded-xl overflow-hidden group cursor-pointer">
                    <div class="relative aspect-[2/3] overflow-hidden bg-neutral-900">
                        <img src="${item.i}" class="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-transform duration-700 group-hover:scale-110" loading="lazy">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                        <div class="absolute bottom-3 left-3 right-3">
                            <span class="text-primary font-black text-[8px] uppercase block mb-0.5">${item.g}</span>
                            <h4 class="text-xs font-bold truncate text-white uppercase">${item.t}</h4>
                        </div>
                    </div>
                </div>
            `).join('');
            
            const observerOptions = { threshold: 0.1 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry, index) => {
                    if (entry.isIntersecting) {
                        setTimeout(() => {
                            entry.target.classList.add('in-view');
                        }, index * 50); 
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.anime-card').forEach(card => observer.observe(card));

            changeSlide(0, true);
            setInterval(() => changeSlide((currentIdx + 1) % heroSlides.length), 7000);
            lucide.createIcons();
            
            let lastScrollY = window.scrollY;
            const nav = document.getElementById('main-nav');
            window.addEventListener('scroll', () => {
                const currentScrollY = window.scrollY;
                if(currentScrollY > 50) {
                    nav.classList.add('nav-scrolled');
                } else {
                    nav.classList.remove('nav-scrolled');
                }
                if (currentScrollY > 80) {
                    nav.classList.toggle('nav-hidden', currentScrollY > lastScrollY);
                } else {
                    nav.classList.remove('nav-hidden');
                }
                lastScrollY = currentScrollY;
            }, { passive: true });
        }
        window.onload = init;
    </script>
</body>
</html>
