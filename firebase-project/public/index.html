<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuroStream | Definitive Anime Experience</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Bebas+Neue&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff003c;
            --primary-glow: rgba(255, 0, 60, 0.5);
            --bg-deep: #050505;
            --card-bg: #0d0d0f;
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            overflow-x: hidden;
        }

        .font-bebas { font-family: 'Bebas Neue', cursive; }
        .font-outfit { font-family: 'Outfit', sans-serif; }

        /* Custom Gradients */
        .crimson-gradient {
            background: linear-gradient(135deg, #ff003c 0%, #990024 100%);
        }

        .hero-mask {
            background: linear-gradient(to right, var(--bg-deep) 0%, rgba(5, 5, 5, 0.8) 30%, transparent 100%),
                        linear-gradient(to top, var(--bg-deep) 10%, transparent 50%);
        }

        /* High-End Card Design */
        .anime-card {
            background: var(--card-bg);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .anime-card:hover {
            transform: scale(1.05) translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(255, 0, 60, 0.2);
            z-index: 10;
        }

        .anime-card .poster-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
        }

        .anime-card .poster-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.8) 100%);
            opacity: 0.5;
            z-index: 1;
        }

        /* Glass Controls */
        .glass-panel {
            background: rgba(15, 15, 18, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Scroll Animation */
        .scroll-reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }
        .scroll-reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Neon Accent */
        .neon-text {
            text-shadow: 0 0 10px var(--primary-glow);
        }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <!-- Global Navigation -->
    <nav class="fixed top-0 w-full z-[100] px-6 py-4 flex justify-between items-center transition-all duration-500" id="main-nav">
        <div class="flex items-center gap-12">
            <!-- Brand -->
            <div class="flex items-center gap-2 cursor-pointer group">
                <div class="w-12 h-12 crimson-gradient rounded-full flex items-center justify-center shadow-[0_0_20px_var(--primary-glow)] transition-transform group-hover:rotate-[360deg] duration-700">
                    <i data-lucide="zap" class="text-white fill-current w-6 h-6"></i>
                </div>
                <h1 class="text-3xl font-bebas tracking-wider text-white">KURO<span class="text-primary neon-text">STREAM</span></h1>
            </div>

            <!-- Desktop Links -->
            <div class="hidden lg:flex items-center gap-8 text-[11px] font-bold uppercase tracking-[0.2em] text-gray-400">
                <a href="#" class="text-white hover:text-white transition-colors">Browse</a>
                <a href="#" class="hover:text-primary transition-colors">Simulcasts</a>
                <a href="#" class="hover:text-primary transition-colors">Movies</a>
                <a href="#" class="hover:text-primary transition-colors">Manga</a>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="hidden md:flex items-center glass-panel rounded-full px-4 py-1.5 border border-white/10 focus-within:border-primary transition-all">
                <i data-lucide="search" class="w-4 h-4 text-gray-500"></i>
                <input type="text" placeholder="Quick Search..." class="bg-transparent border-none text-xs px-3 focus:outline-none w-48 text-white">
            </div>
            <button class="bg-white text-black font-black text-[10px] uppercase px-6 py-2.5 rounded-full hover:bg-primary hover:text-white transition-all">
                Sign In
            </button>
        </div>
    </nav>

    <!-- Main Experience -->
    <main>
        <!-- Cinematic Hero -->
        <section class="relative h-screen w-full flex items-center overflow-hidden">
            <!-- Asset Layer -->
            <div class="absolute inset-0">
                <img src="https://images.unsplash.com/photo-1578632292335-df3abbb0d586?q=80&w=2000" 
                     class="w-full h-full object-cover scale-105" alt="Background">
                <div class="absolute inset-0 hero-mask"></div>
            </div>

            <!-- Content Layer -->
            <div class="relative w-full max-w-[1600px] mx-auto px-8 pt-20">
                <div class="max-w-3xl space-y-6">
                    <div class="flex items-center gap-3">
                        <span class="bg-primary px-3 py-1 rounded text-[10px] font-black uppercase tracking-tighter">New Episode</span>
                        <span class="text-gray-400 font-bold text-xs uppercase tracking-widest">S1 E12 • Winter 2024</span>
                    </div>
                    
                    <h2 class="text-7xl md:text-9xl font-bebas leading-none tracking-tight text-white">
                        SOLO <span class="text-primary">LEVELING</span>
                    </h2>
                    
                    <p class="text-lg text-gray-300 max-w-xl font-medium leading-relaxed">
                        En un mundo de cazadores y portales, el cazador más débil de la humanidad, Sung Jin-Woo, encuentra una misión oculta que solo él puede ver.
                    </p>

                    <div class="flex flex-wrap items-center gap-4 pt-4">
                        <button class="crimson-gradient text-white px-12 py-4 rounded-full font-black text-xs uppercase tracking-widest flex items-center gap-3 shadow-2xl hover:scale-105 transition-transform active:scale-95">
                            <i data-lucide="play" class="w-5 h-5 fill-current"></i> Start Watching
                        </button>
                        <button class="glass-panel text-white p-4 rounded-full hover:bg-white/10 transition-all">
                            <i data-lucide="plus" class="w-6 h-6"></i>
                        </button>
                        <button class="glass-panel text-white p-4 rounded-full hover:bg-white/10 transition-all">
                            <i data-lucide="share-2" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Content Grid -->
        <div class="max-w-[1600px] mx-auto px-8 -mt-32 relative z-10 pb-40">
            
            <!-- Trending Row -->
            <section class="space-y-8">
                <div class="flex justify-between items-end">
                    <div class="space-y-1">
                        <p class="text-primary font-black text-[10px] uppercase tracking-[0.3em]">Top Rated</p>
                        <h3 class="text-4xl font-bebas tracking-wide">CONTINUE <span class="text-gray-500 italic">WATCHING</span></h3>
                    </div>
                    <div class="flex gap-3">
                        <button class="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center hover:bg-primary transition-all">
                            <i data-lucide="chevron-left" class="w-5 h-5"></i>
                        </button>
                        <button class="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center hover:bg-primary transition-all">
                            <i data-lucide="chevron-right" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div id="dynamic-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                    <!-- Cards are generated via Script for cleaner code -->
                </div>
            </section>
        </div>
    </main>

    <!-- Mobile App-Style Menu -->
    <div class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass-panel rounded-3xl p-2 flex justify-between items-center z-[200] shadow-2xl border border-white/10">
        <button class="w-14 h-14 flex items-center justify-center text-primary">
            <i data-lucide="home" class="w-6 h-6"></i>
        </button>
        <button class="w-14 h-14 flex items-center justify-center text-gray-400">
            <i data-lucide="compass" class="w-6 h-6"></i>
        </button>
        <button class="w-16 h-16 crimson-gradient rounded-2xl flex items-center justify-center text-white shadow-xl -mt-10 border-[6px] border-[#050505]">
            <i data-lucide="search" class="w-7 h-7"></i>
        </button>
        <button class="w-14 h-14 flex items-center justify-center text-gray-400">
            <i data-lucide="bookmark" class="w-6 h-6"></i>
        </button>
        <button class="w-14 h-14 flex items-center justify-center text-gray-400">
            <i data-lucide="settings" class="w-6 h-6"></i>
        </button>
    </div>

    <script>
        // Data for simulation
        const animeData = [
            { title: "Chainsaw Man", tags: "Action • Horror", score: "9.5", img: "https://images.unsplash.com/photo-1618336753974-aae8e04506aa?q=80&w=600" },
            { title: "Jujutsu Kaisen", tags: "Shonen • Supernatural", score: "9.8", img: "https://images.unsplash.com/photo-1607604276443-cda2c9309174?q=80&w=600" },
            { title: "Demon Slayer", tags: "Adventure • Fantasy", score: "9.9", img: "https://images.unsplash.com/photo-1621478374422-35206faeddfb?q=80&w=600" },
            { title: "Attack on Titan", tags: "Drama • Mystery", score: "9.7", img: "https://images.unsplash.com/photo-1541562232579-512a21360020?q=80&w=600" },
            { title: "Cyberpunk", tags: "Sci-Fi • Gore", score: "9.2", img: "https://images.unsplash.com/photo-1635273051937-2007469062cc?q=80&w=600" },
            { title: "Blue Lock", tags: "Sports • Thriller", score: "8.9", img: "https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=600" }
        ];

        const grid = document.getElementById('dynamic-grid');
        
        // Generate cards dynamically
        function renderCards() {
            // Render 12 cards (2 sets of data)
            const fullList = [...animeData, ...animeData];
            grid.innerHTML = fullList.map(item => `
                <div class="anime-card group rounded-2xl p-2">
                    <div class="poster-wrapper aspect-[2/3]">
                        <img src="${item.img}" 
                             class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" 
                             alt="${item.title}"
                             onerror="this.src='https://via.placeholder.com/600x900/111/fff?text=Poster'">
                        
                        <div class="absolute top-3 left-3 z-10">
                            <span class="bg-black/60 backdrop-blur-md text-white text-[9px] font-black px-2 py-1 rounded border border-white/10">SUB | DUB</span>
                        </div>

                        <div class="absolute inset-0 flex items-center justify-center z-20 opacity-0 group-hover:opacity-100 transition-opacity">
                            <div class="w-14 h-14 crimson-gradient rounded-full flex items-center justify-center shadow-[0_0_30px_var(--primary-glow)] translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
                                <i data-lucide="play" class="w-6 h-6 text-white fill-current"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-3 space-y-2">
                        <h4 class="text-sm font-bold truncate group-hover:text-primary transition-colors">${item.title}</h4>
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">${item.tags}</span>
                            <span class="text-[9px] text-primary font-black">${item.score} ★</span>
                        </div>
                        <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-primary w-2/3 shadow-[0_0_8px_var(--primary-glow)]" style="width: ${Math.floor(Math.random() * 80 + 20)}%"></div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        renderCards();

        // Navbar Interaction
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('main-nav');
            if(window.scrollY > 100) {
                nav.classList.add('glass-panel');
                nav.classList.remove('py-4');
                nav.classList.add('py-2');
            } else {
                nav.classList.remove('glass-panel');
                nav.classList.add('py-4');
                nav.classList.remove('py-2');
            }
        });

        // Intersection Observer for scroll reveal
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) entry.target.classList.add('active');
            });
        });

        document.querySelectorAll('section').forEach(section => {
            section.classList.add('scroll-reveal');
            observer.observe(section);
        });
    </script>
</body>
</html>
