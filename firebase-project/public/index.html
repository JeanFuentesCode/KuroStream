<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuroStream | Local Performance</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff003c;
            --primary-glow: rgba(255, 0, 60, 0.4);
            --bg-deep: #050505;
            --card-bg: #0d0d0f;
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .font-bebas { font-family: 'Bebas Neue', cursive; }

        .crimson-gradient {
            background: linear-gradient(135deg, #ff003c 0%, #990024 100%);
        }

        .hero-mask {
            background: linear-gradient(to right, var(--bg-deep) 0%, rgba(5, 5, 5, 0.6) 30%, transparent 100%),
                        linear-gradient(to top, var(--bg-deep) 10%, transparent 50%);
        }

        /* Transición de Imagen Local Ultra Rápida */
        #hero-img {
            transition: opacity 0.5s ease-in-out, filter 0.5s ease-in-out;
            filter: brightness(0.6);
        }

        .img-hidden {
            opacity: 0;
            filter: brightness(0) blur(10px);
        }

        /* Animación de Texto Lateral (Slide) */
        .hero-text-anim {
            animation: heroSlideIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes heroSlideIn {
            0% { opacity: 0; transform: translateX(40px); filter: blur(10px); }
            100% { opacity: 1; transform: translateX(0); filter: blur(0); }
        }

        .hero-text-exit {
            animation: heroSlideOut 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes heroSlideOut {
            0% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(-40px); filter: blur(10px); }
        }

        .anime-card {
            background: var(--card-bg);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .anime-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 20px 40px -15px var(--primary-glow);
        }

        .glass-panel {
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Clase para ocultar contenido inicialmente */
        .reveal-init {
            opacity: 0;
            transition: opacity 0.8s ease-out;
        }

        .revealed {
            opacity: 1 !important;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <!-- Navegación -->
    <nav class="fixed top-0 w-full z-[100] px-6 py-4 flex justify-between items-center transition-all duration-500" id="main-nav">
        <div class="flex items-center gap-10">
            <div class="flex items-center gap-2 cursor-pointer">
                <div class="w-10 h-10 crimson-gradient rounded-full flex items-center justify-center shadow-[0_0_20px_var(--primary-glow)]">
                    <i data-lucide="zap" class="text-white fill-current w-5 h-5"></i>
                </div>
                <h1 class="text-2xl font-bebas tracking-wider uppercase">Kuro<span class="text-primary">Stream</span></h1>
            </div>
            <div class="hidden lg:flex items-center gap-8 text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">
                <a href="#" class="hover:text-white transition-colors">Catálogo</a>
                <a href="#" class="hover:text-white transition-colors">Simulcasts</a>
                <a href="#" class="hover:text-white transition-colors">Comunidad</a>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <button class="bg-white text-black font-black text-[10px] uppercase px-6 py-2 rounded-full hover:bg-primary hover:text-white transition-all">
                Acceder
            </button>
        </div>
    </nav>

    <main>
        <!-- Hero Section -->
        <section class="relative h-[95vh] w-full flex items-center overflow-hidden bg-black">
            <div class="absolute inset-0">
                <!-- Imagen de fondo principal (LOCAL) -->
                <img id="hero-img" src="" class="w-full h-full object-cover img-hidden" alt="Hero">
                <div class="absolute inset-0 hero-mask z-10"></div>
            </div>

            <div class="relative w-full max-w-[1440px] mx-auto px-6 z-20">
                <!-- Jean: He añadido reveal-init para que empiece invisible -->
                <div id="hero-content-wrapper" class="max-w-2xl space-y-6 reveal-init">
                    <div class="flex items-center gap-3">
                        <span id="hero-tag" class="bg-primary px-3 py-1 rounded-sm text-[10px] font-black uppercase tracking-tighter shadow-lg shadow-primary/20"></span>
                        <span id="hero-info" class="text-gray-400 font-bold text-[10px] uppercase tracking-[0.3em]"></span>
                    </div>
                    <h2 id="hero-title" class="text-7xl md:text-9xl font-bebas leading-[0.85] text-white uppercase italic tracking-tighter">
                        <!-- Título dinámico -->
                    </h2>
                    <p id="hero-desc" class="text-lg text-gray-300 max-w-lg font-medium leading-relaxed border-l-2 border-primary pl-5">
                        <!-- Descripción dinámica -->
                    </p>
                    <div class="flex items-center gap-4 pt-4">
                        <button class="crimson-gradient text-white px-10 py-4 rounded-full font-black text-xs uppercase tracking-widest flex items-center gap-3 hover:scale-105 transition-transform shadow-2xl shadow-primary/30">
                            <i data-lucide="play" class="w-5 h-5 fill-current"></i> Ver Ahora
                        </button>
                        <button class="glass-panel text-white p-4 rounded-full hover:bg-white/10 transition-all">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Indicadores -->
            <div class="absolute bottom-12 left-6 flex items-end gap-3 z-30" id="indicators"></div>
        </section>

        <!-- Cartelera -->
        <div class="max-w-[1440px] mx-auto px-6 -mt-32 relative z-40 pb-32">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h3 class="text-4xl font-bebas tracking-tighter italic">EXPLORA LO <span class="text-primary">ÚLTIMO</span></h3>
                    <p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Local Cache Enabled</p>
                </div>
            </div>
            <div id="anime-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        </div>
    </main>

    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js"></script>
    <script>
        const heroSlides = [
            {
                title: "SOLO <span class='text-primary'>LEVELING</span>",
                desc: "Del más débil al más fuerte. Sung Jinwoo despierta un sistema de niveles secreto en un mundo de cazadores y mazmorras letales.",
                tag: "Tendencia",
                info: "S1 • Acción / Fantasía",
                img: "imagen1.webp"
            },
            {
                title: "ONE <span class='text-primary'>PIECE</span>",
                desc: "La era de la piratería no termina. Únete a Luffy en el arco de Egghead mientras el mundo se prepara para la guerra final.",
                tag: "Legendario",
                info: "Ep 1115 • Aventura",
                img: "imagen2.webp"
            },
            {
                title: "FRIEREN <span class='text-primary'>BEYOND</span>",
                desc: "Tras derrotar al Rey Demonio, la elfa Frieren comienza un nuevo viaje para entender la brevedad de la vida humana.",
                tag: "Aclamado",
                info: "S1 • Viaje / Magia",
                img: "imagen3.webp"
            },
            {
                title: "DEMON <span class='text-primary'>SLAYER</span>",
                desc: "La respiración del sol vuelve. Tanjiro y los pilares se preparan para el asalto final al Castillo Infinito.",
                tag: "Épico",
                info: "Nueva Temporada • Shonen",
                img: "imagen4.webp"
            },
            {
                title: "JUJUTSU <span class='text-primary'>KAISEN</span>",
                desc: "La expansión de dominio es solo el comienzo. Itadori se enfrenta a su destino mientras las maldiciones toman el control.",
                tag: "Popular",
                info: "S2 • Sobrenatural",
                img: "imagen5.webp"
            }
        ];

        const catalog = [
            { t: "Kaiju No. 8", s: "9.2", g: "Acción", i: "https://images.unsplash.com/photo-1607604276443-cda2c9309174?q=80&w=400" },
            { t: "Tokyo Revengers", s: "8.7", g: "Drama", i: "https://images.unsplash.com/photo-1618336753974-aae8e04506aa?q=80&w=400" },
            { t: "Mushoku Tensei", s: "9.5", g: "Isekai", i: "https://images.unsplash.com/photo-1635273051937-2007469062cc?q=80&w=400" },
            { t: "Naruto", s: "9.5", g: "Ninja", i: "https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=400" },
            { t: "Bleach TYBW", s: "9.9", g: "Espadas", i: "https://images.unsplash.com/photo-1560972550-aba3456b5564?q=80&w=400" },
            { t: "Blue Lock", s: "9.0", g: "Deportes", i: "https://images.unsplash.com/photo-1552072092-7f9b8d63efcb?q=80&w=400" }
        ];

        let currentIdx = 0;
        const heroImg = document.getElementById('hero-img');
        const heroWrapper = document.getElementById('hero-content-wrapper');

        function changeSlide(index, isFirstLoad = false) {
            // Salida de texto y fundido de imagen (solo si no es la primera carga)
            if (!isFirstLoad) {
                heroWrapper.classList.remove('hero-text-anim');
                heroWrapper.classList.add('hero-text-exit');
                heroImg.classList.add('img-hidden');
            }

            setTimeout(() => {
                currentIdx = index;
                const slide = heroSlides[currentIdx];
                
                // Actualizar contenido
                heroImg.src = slide.img;
                document.getElementById('hero-title').innerHTML = slide.title;
                document.getElementById('hero-desc').textContent = slide.desc;
                document.getElementById('hero-tag').textContent = slide.tag;
                document.getElementById('hero-info').textContent = slide.info;
                
                // Entrada sincronizada
                heroImg.classList.remove('img-hidden');
                heroWrapper.classList.remove('hero-text-exit');
                
                if (isFirstLoad) {
                    heroWrapper.classList.add('revealed');
                }
                
                void heroWrapper.offsetWidth; // Force reflow
                heroWrapper.classList.add('hero-text-anim');
                
                updateIndicators();
            }, isFirstLoad ? 0 : 500); 
        }

        function updateIndicators() {
            const container = document.getElementById('indicators');
            container.innerHTML = '';
            heroSlides.forEach((_, i) => {
                const bar = document.createElement('div');
                bar.className = `h-1 transition-all duration-700 rounded-full cursor-pointer ${i === currentIdx ? 'w-20 bg-primary shadow-[0_0_20px_var(--primary-glow)]' : 'w-6 bg-white/20 hover:bg-white/40'}`;
                bar.onclick = () => changeSlide(i);
                container.appendChild(bar);
            });
        }

        function init() {
            // Cargar grilla
            const grid = document.getElementById('anime-grid');
            catalog.forEach(item => {
                const card = document.createElement('div');
                card.className = "anime-card rounded-xl overflow-hidden group cursor-pointer";
                card.innerHTML = `
                    <div class="relative aspect-[2/3] overflow-hidden">
                        <img src="${item.i}" class="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-all duration-700 group-hover:scale-110" alt="${item.t}">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-90"></div>
                        <div class="absolute bottom-3 left-3 right-3">
                            <span class="text-primary font-black text-[9px] uppercase block mb-1">${item.g}</span>
                            <h4 class="text-xs font-bold truncate text-white uppercase tracking-tight">${item.t}</h4>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Iniciar carrusel (Jean: 9 segundos) con bandera de "primera carga"
            changeSlide(0, true);
            
            setInterval(() => {
                let next = (currentIdx + 1) % heroSlides.length;
                changeSlide(next);
            }, 9000);

            lucide.createIcons();
            
            window.addEventListener('scroll', () => {
                const nav = document.getElementById('main-nav');
                nav.style.background = window.scrollY > 50 ? 'rgba(5,5,5,0.95)' : 'transparent';
                nav.style.paddingBlock = window.scrollY > 50 ? '0.75rem' : '1rem';
            });
        }

        window.onload = init;
    </script>
</body>
</html>
